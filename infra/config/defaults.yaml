# Non-secret defaults shared across every environment.
# Per-env overrides live in local.yaml / dev.yaml / demo.yaml.
# Anything secret (POSTGRES_PASSWORD, JWT_SECRET) stays out of this file
# — it is generated by scripts/dev-bootstrap.sh into a gitignored .env.

node_env: development
log_level: info

postgres:
  user: conduit
  db: conduit
  host_port: 5432

api:
  host: 0.0.0.0
  port: 3001
  host_port: 3001

web:
  port: 3000
  host_port: 3000

jwt:
  ttl_seconds: 604800

cookie:
  domain: localhost
  secure: false
