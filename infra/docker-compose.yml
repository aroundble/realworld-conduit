# Reproducible local environment for Conduit (walking skeleton).
#
# Three services — postgres, api, web — wired via env vars only.
# No hardcoded hostnames or ports inside application source.
#
# Bring up:   docker compose -f infra/docker-compose.yml --env-file .env up -d --build
# Tear down:  docker compose -f infra/docker-compose.yml --env-file .env down -v
#
# The --env-file .env flag is mandatory: compose auto-discovers .env
# relative to this file's directory (infra/), but scripts/dev-bootstrap.sh
# writes .env at the repo root. Running without --env-file substitutes
# blank strings for required secrets and the stack fails silently.
# Required secrets are declared with the ${VAR:?message} form below so
# compose hard-fails rather than carrying on with empty values.

name: conduit

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-conduit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?missing — run scripts/dev-bootstrap.sh then pass --env-file .env}
      POSTGRES_DB: ${POSTGRES_DB:-conduit}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-conduit} -d ${POSTGRES_DB:-conduit}"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      API_HOST: 0.0.0.0
      API_PORT: ${API_PORT:-3001}
      DATABASE_URL: postgresql://${POSTGRES_USER:-conduit}:${POSTGRES_PASSWORD:?missing — run scripts/dev-bootstrap.sh then pass --env-file .env}@postgres:5432/${POSTGRES_DB:-conduit}
      JWT_SECRET: ${JWT_SECRET:?missing — run scripts/dev-bootstrap.sh then pass --env-file .env}
      JWT_TTL_SECONDS: ${JWT_TTL_SECONDS:-604800}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-localhost}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      WEB_URL: ${WEB_URL:-http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Rate limiting (#116). OFF by default (empty string) so burst-
      # write test suites + Bruno conformance don't trip the limits.
      # Production compose sets RATE_LIMIT_ENABLED=1; spec 116
      # explicitly enables it via a separate test run in CI.
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-}
      # Body-size caps (#126). Global floor applies to every mutating
      # endpoint; the smaller article cap applies to POST /articles +
      # PUT /articles/{slug}. Defaults (1024 / 100) are enforced by
      # apps/api/src/middleware/body-limit.ts when these are unset.
      API_BODY_LIMIT_GLOBAL_KB: ${API_BODY_LIMIT_GLOBAL_KB:-}
      API_BODY_LIMIT_ARTICLE_KB: ${API_BODY_LIMIT_ARTICLE_KB:-}
      # Security headers (#124). Off for local HTTP; any env that
      # terminates TLS (staging/prod) sets ENFORCE_HSTS=true to
      # emit the 2-year HSTS preload header. The other baseline
      # headers (nosniff / DENY / Referrer-Policy / Permissions-
      # Policy) ship unconditionally.
      ENFORCE_HSTS: ${ENFORCE_HSTS:-}
      # /metrics auth (#139). Empty in dev so local scraping works
      # without a secret; production compose MUST set METRICS_TOKEN
      # to a long random value or /metrics returns 401.
      METRICS_TOKEN: ${METRICS_TOKEN:-}
      # HTTP cache headers (#151). OFF in dev/test by default so
      # Bruno conformance + smoke specs don't hit 304s. Production
      # compose sets API_CACHE_ENABLED=1 so CDN / browser / reverse
      # proxies honor the Cache-Control + ETag policy.
      API_CACHE_ENABLED: ${API_CACHE_ENABLED:-}
    ports:
      - "${API_HOST_PORT:-3001}:3001"
    healthcheck:
      # 127.0.0.1 (not "localhost") so busybox wget doesn't try ::1 first
      # on hosts that prefer IPv6 in /etc/hosts — the Node server binds
      # 0.0.0.0 (IPv4 only) so an IPv6-first resolver would fail.
      test:
        - CMD-SHELL
        - 'wget -qO- "http://127.0.0.1:${API_PORT:-3001}/healthz" | grep -q ''"ok":true'''
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        # Must flow in at build time because next.config.ts's CSP
        # `connect-src` + HSTS decision are baked into the static
        # routes-manifest. Compose passes the same .env values as
        # runtime environment.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
        ENFORCE_HSTS: ${ENFORCE_HSTS:-}
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${WEB_PORT:-3000}
      API_URL: ${API_URL_INTERNAL:-http://api:3001}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      CONDUIT_TEST_SLOW_SUSPENSE: ${CONDUIT_TEST_SLOW_SUSPENSE:-}
      # Error-boundary test knob (#147). Enables the /throwtest
      # page which deliberately throws so Playwright can exercise
      # the segment error.tsx. Production deploys leave this unset
      # — the page responds with a harmless notice instead.
      CONDUIT_ENABLE_THROW_TEST: ${CONDUIT_ENABLE_THROW_TEST:-1}
      # Security headers (#124). Mirrors the API's flag — only cloud
      # envs behind a TLS terminator set this; local dev runs on
      # http:// and must not emit HSTS (would lock the browser into
      # treating localhost as HTTPS-only).
      ENFORCE_HSTS: ${ENFORCE_HSTS:-}
    ports:
      - "${WEB_HOST_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${WEB_PORT:-3000}/ >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s

volumes:
  postgres_data:
