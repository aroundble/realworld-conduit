name: CI

# Single pipeline: lint + typecheck + build both apps + compose up + smoke
# both URLs. Target is < 10 min on ubuntu-latest.
#
# Security note: this workflow accepts no user-controlled input into run:
# commands. github.ref is used only as a concurrency key. No PR title,
# body, commit message, or head_ref is interpolated into shell.

on:
  pull_request:
    branches: [latest, main]
  push:
    branches: [latest]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: "10.33.2"
  NODE_VERSION: "22"

jobs:
  install:
    name: install + lint + typecheck + build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: enable corepack + pnpm
        run: |
          corepack enable
          corepack prepare pnpm@"${PNPM_VERSION}" --activate

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: install
        run: pnpm install --frozen-lockfile=false

      - name: lint
        run: pnpm run lint

      - name: typecheck
        run: pnpm run typecheck

      - name: build web
        run: pnpm --filter @conduit/web build

      - name: build api
        run: pnpm --filter @conduit/api build

  smoke:
    name: compose up + smoke both services
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: install
    # Compose auto-discovers .env next to the compose file, not at the repo
    # root, so every docker-compose invocation in this job passes
    # --env-file .env explicitly — matching scripts/dev-bootstrap.sh output.
    env:
      COMPOSE: docker compose -f infra/docker-compose.yml --env-file .env
    steps:
      - uses: actions/checkout@v4

      - name: enable corepack + pnpm
        run: |
          corepack enable
          corepack prepare pnpm@"${PNPM_VERSION}" --activate

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: install
        run: pnpm install --frozen-lockfile=false

      - name: bootstrap .env
        run: bash scripts/dev-bootstrap.sh

      - name: compose up
        run: $COMPOSE up -d --build

      - name: wait for healthy (postgres + api + web)
        run: |
          set -e
          for svc in postgres api web; do
            echo "::group::waiting on $svc"
            state=starting
            for i in $(seq 1 60); do
              state=$(docker inspect --format '{{.State.Health.Status}}' "conduit-${svc}-1" 2>/dev/null || echo starting)
              echo "[${svc}] ${state} (attempt ${i}/60)"
              if [ "$state" = "healthy" ]; then break; fi
              sleep 2
            done
            if [ "$state" != "healthy" ]; then
              echo "::error::${svc} never became healthy"
              $COMPOSE logs "$svc" | tail -200
              exit 1
            fi
            echo "::endgroup::"
          done

      - name: smoke
        run: bash scripts/smoke.sh

      - name: run newman smoke
        # Newman writes tests/api/results/<utc-ts>.xml + a `latest`
        # symlink, both of which satisfy the evaluator's gate 6
        # (scripts/eval-merge-gate.sh:~325). ~100ms against /healthz,
        # well under the AC's 15s budget.
        env:
          API_URL: http://localhost:3001
        run: pnpm test:conformance:smoke

      - name: upload newman smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-smoke-${{ github.event.pull_request.number || github.run_id }}
          path: tests/api/results/**
          if-no-files-found: warn

      - name: run bruno conformance
        # Canonical RealWorld Bruno collection (151 .bru files, upstream
        # SHA e75fef39). Gate is baseline-aware via
        # tests/api/bruno-baseline.json — any new failure or any baseline
        # entry that now passes is a regression. See issue #36 and the
        # follow-up cluster issues for how the baseline shrinks to zero.
        env:
          # Match CI's compose defaults — dev-bootstrap writes API_HOST_PORT=3001
          # here, while the local env file uses 3101 to avoid cross-worktree
          # port collisions. Override the collection env's `host` var.
          BRUNO_HOST: http://localhost:3001
        run: pnpm test:conformance

      - name: upload bruno conformance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bruno-conformance-${{ github.event.pull_request.number || github.run_id }}
          path: tests/api/results/**
          if-no-files-found: warn

      - name: install playwright browsers
        # The runner already has Node + pnpm from the `install` job's tree;
        # we only need the browser binaries. --with-deps pulls the OS libs
        # the chromium build needs on ubuntu-latest.
        run: pnpm exec playwright install --with-deps chromium

      - name: run playwright smoke
        # Smoke binds to the host ports the compose stack exposes by default.
        # dev-bootstrap writes API_HOST_PORT=3001 / WEB_HOST_PORT=3000 into
        # .env unless overridden, which matches these URLs.
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          API_URL: http://localhost:3001
        run: pnpm test:e2e:smoke

      - name: upload playwright smoke artifacts
        # summary.json satisfies the evaluator's gate 3, the per-issue
        # screenshot satisfies gate 4. Uploading both on every run keeps
        # the audit trail even if compose brings the stack down after.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-${{ github.event.pull_request.number || github.run_id }}
          path: |
            tests/e2e/test-results/**/summary.json
            tests/e2e/screenshots/**
          if-no-files-found: warn

      - name: compose logs on failure
        if: failure()
        run: $COMPOSE logs --no-color --tail=200

      - name: compose down
        if: always()
        run: $COMPOSE down -v
